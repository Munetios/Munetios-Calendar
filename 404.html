const supportedLanguageCodes = Object.keys(pageTranslations);

if (supportedLanguageCount !== 100) {
  console.error(`Expected 100 languages, found ${supportedLanguageCount}.`);
}

const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length
  ? navigator.languages
  : [navigator.language || "en"];

const normalizedLanguages = browserLanguages
  .filter(Boolean)
  .map((language) => language.toLowerCase());

const matchedLanguage = normalizedLanguages.find((language) => pageTranslations[language])
  || normalizedLanguages.map((language) => language.split("-")[0]).find((language) => pageTranslations[language])
  || "en";

const selectedTranslation = pageTranslations[matchedLanguage] || baseTranslation;
